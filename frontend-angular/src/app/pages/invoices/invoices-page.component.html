<mat-card class="panel">
  <mat-card-header>
    <mat-card-title>Invoices</mat-card-title>
    <mat-card-subtitle>Create notes and inspect open versus closed workflows.</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="page-actions">
      <button mat-flat-button color="primary" type="button" (click)="createInvoice()" [disabled]="creating">
        @if (creating) {
          <mat-spinner diameter="18" />
        }
        Create invoice
      </button>

      <button mat-stroked-button type="button" (click)="refresh()">
        Refresh
      </button>
    </div>

    @if (loading) {
      <mat-progress-bar mode="indeterminate" />
    }

    <div class="table-wrapper">
      <table mat-table [dataSource]="(invoices$ | async) ?? []" class="invoices-table">
        <ng-container matColumnDef="number">
          <th mat-header-cell *matHeaderCellDef>Number</th>
          <td mat-cell *matCellDef="let invoice">#{{ invoice.sequentialNumber }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let invoice">
            <mat-chip [class.closed-chip]="invoice.status === 'CLOSED'">
              {{ invoice.status }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="items">
          <th mat-header-cell *matHeaderCellDef>Items</th>
          <td mat-cell *matCellDef="let invoice">{{ invoice.items.length }}</td>
        </ng-container>

        <ng-container matColumnDef="attempts">
          <th mat-header-cell *matHeaderCellDef>Print attempts</th>
          <td mat-cell *matCellDef="let invoice">{{ invoice.printAttempts }}</td>
        </ng-container>

        <ng-container matColumnDef="updatedAt">
          <th mat-header-cell *matHeaderCellDef>Updated</th>
          <td mat-cell *matCellDef="let invoice">{{ invoice.updatedAt | date: 'short' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let invoice">
            <a mat-button [routerLink]="['/invoices', invoice.id]">View details</a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackByInvoiceId"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
