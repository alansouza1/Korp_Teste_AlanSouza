services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  estoque-service:
    build:
      context: ./estoque-service
    container_name: estoque-service
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=estoque_db;Username=postgres;Password=postgres
    ports:
      - "5001:8080"

  faturamento-service:
    build:
      context: ./faturamento-service
    container_name: faturamento-service
    depends_on:
      - postgres
      - estoque-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=faturamento_db;Username=postgres;Password=postgres
      Services__EstoqueBaseUrl: http://estoque-service:8080
    ports:
      - "5002:8080"

volumes:
  postgres_data:
